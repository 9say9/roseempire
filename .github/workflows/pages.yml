name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for secrets
        run: python scripts/check_secrets.py

      - name: Guard live checkout / Sarah URLs
        run: python scripts/check_site_config.py

      - name: Validate catalog JSON
        run: python -c "import json; json.load(open('catalog-data.json', encoding='utf-8'))"

      - name: Build public site folder
        run: |
          mkdir -p site/assets/products
          cp index.html 404.html care-homes.html hotels.html wholesale-mattress-protectors.html privacy.html site/
          cp styles.css styles.min.css app.js site-config.js quote-pdf.js quote-pricing.js quote-shipping.js rose-icons.js catalog-data.json sarah-widget.js sitemap.xml robots.txt CNAME .nojekyll site/
          cp -r assets/* site/assets/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
