<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Rose Empire rose emblem">
  <defs>
    <linearGradient id="petalLight" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#d4687f"/>
      <stop offset="100%" stop-color="#a8435c"/>
    </linearGradient>
    <linearGradient id="petalMid" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#b84d65"/>
      <stop offset="100%" stop-color="#7a2f42"/>
    </linearGradient>
    <linearGradient id="petalDeep" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#8f3548"/>
      <stop offset="100%" stop-color="#5c1f30"/>
    </linearGradient>
    <linearGradient id="badgeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#152a47"/>
      <stop offset="100%" stop-color="#0c1a30"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#a67c2e"/>
    </linearGradient>
  </defs>
  <!-- Badge — keeps rose crisp on white header -->
  <circle cx="50" cy="50" r="46" fill="url(#badgeBg)"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#goldAccent)" stroke-width="2.2"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="#c9a84a" stroke-width="0.8" opacity="0.45"/>

  <!-- Outer petals -->
  <path fill="url(#petalLight)" stroke="#5c1f30" stroke-width="0.6" stroke-linejoin="round"
    d="M50 18 C58 14 68 20 66 30 C64 36 56 34 50 38 C44 34 36 36 34 30 C32 20 42 14 50 18Z"/>
  <path fill="url(#petalLight)" stroke="#5c1f30" stroke-width="0.6" stroke-linejoin="round"
    d="M72 34 C80 30 86 40 80 48 C76 54 68 50 64 44 C70 38 72 34 72 34Z"/>
  <path fill="url(#petalLight)" stroke="#5c1f30" stroke-width="0.6" stroke-linejoin="round"
    d="M28 34 C20 30 14 40 20 48 C24 54 32 50 36 44 C30 38 28 34 28 34Z"/>
  <path fill="url(#petalLight)" stroke="#5c1f30" stroke-width="0.6" stroke-linejoin="round"
    d="M66 62 C74 58 78 70 68 74 C62 76 58 68 56 62 C62 60 66 62 66 62Z"/>
  <path fill="url(#petalLight)" stroke="#5c1f30" stroke-width="0.6" stroke-linejoin="round"
    d="M34 62 C26 58 22 70 32 74 C38 76 42 68 44 62 C38 60 34 62 34 62Z"/>

  <!-- Mid petals -->
  <path fill="url(#petalMid)" stroke="#4a1828" stroke-width="0.5" stroke-linejoin="round"
    d="M50 28 C58 26 64 34 60 42 C57 48 52 46 50 50 C48 46 43 48 40 42 C36 34 42 26 50 28Z"/>
  <path fill="url(#petalMid)" stroke="#4a1828" stroke-width="0.5" stroke-linejoin="round"
    d="M62 38 C70 36 74 46 68 52 C64 56 58 52 54 48 C58 42 62 38 62 38Z"/>
  <path fill="url(#petalMid)" stroke="#4a1828" stroke-width="0.5" stroke-linejoin="round"
    d="M38 38 C30 36 26 46 32 52 C36 56 42 52 46 48 C42 42 38 38 38 38Z"/>

  <!-- Inner bloom -->
  <path fill="url(#petalDeep)" stroke="#3d1220" stroke-width="0.4"
    d="M50 38 C56 36 60 42 58 48 C56 52 52 50 50 54 C48 50 44 52 42 48 C40 42 44 36 50 38Z"/>
  <circle cx="50" cy="46" r="5.5" fill="#5c1f30"/>
  <circle cx="50" cy="46" r="3" fill="#8f3548"/>
  <circle cx="48.5" cy="44.5" r="1.2" fill="#d4687f" opacity="0.85"/>

  <!-- Stem & leaves -->
  <path d="M50 54 L50 78" stroke="url(#goldAccent)" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M50 62 Q62 60 68 68" fill="none" stroke="#7a9a4a" stroke-width="2" stroke-linecap="round"/>
  <path d="M50 70 Q38 68 32 76" fill="none" stroke="#7a9a4a" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="64" cy="66" rx="7" ry="4" fill="#5a7a38" transform="rotate(25 64 66)"/>
  <ellipse cx="36" cy="74" rx="7" ry="4" fill="#5a7a38" transform="rotate(-30 36 74)"/>
</svg>
