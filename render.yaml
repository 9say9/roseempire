# Rose Empire chat API (Sarah wholesale + Alex retail).
# Static site stays on GitHub Pages; this service powers live chat only.
services:
  - type: web
    name: rose-empire-chat
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements-chat.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 server:app
    healthCheckPath: /health
    envVars:
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: PYTHON_VERSION
        value: "3.12.0"
